<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOMENT">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>MOMENT — My English Diary</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    :root{
      --bg:#f7f4f0;--white:#ffffff;--ink:#1a1a1a;--ink2:#444;
      --muted:#999;--border:#e8e2db;--accent:#c4a882;--accent2:#8b7355;
    }

    html,body{height:100%;overflow:hidden}

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--ink);
      display:flex;
      flex-direction:column;
    }

    /* ── HEADER ── */
    header{
      background:var(--white);
      border-bottom:1px solid var(--border);
      padding:0 20px;
      padding-top:env(safe-area-inset-top);
      height:calc(56px + env(safe-area-inset-top));
      display:flex;align-items:flex-end;padding-bottom:0;
      justify-content:space-between;
      flex-shrink:0;
      align-items:center;
    }

    .logo{
      font-family:'Cormorant Garamond',serif;
      font-size:1.5rem;font-weight:300;
      letter-spacing:0.25em;color:var(--ink);
    }

    .nav-tabs{display:flex;gap:2px}

    .nav-btn{
      padding:7px 16px;border:1px solid transparent;
      border-radius:100px;background:transparent;
      font-family:'Inter',sans-serif;font-size:0.75rem;
      font-weight:500;letter-spacing:0.06em;
      cursor:pointer;color:var(--muted);transition:all .2s;
      text-transform:uppercase;
    }

    .nav-btn.active{background:var(--ink);color:var(--white)}

    /* ── SCROLLABLE BODY ── */
    .pages{flex:1;overflow:hidden;position:relative}

    .page{
      position:absolute;inset:0;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      display:none;
    }

    .page.active{display:block}

    /* ── WRITE ── */
    .write-layout{
      max-width:540px;margin:0 auto;
      padding:32px 16px 120px;
    }

    .date-hero{margin-bottom:28px}

    .date-day{
      font-family:'Cormorant Garamond',serif;
      font-size:4.5rem;font-weight:300;line-height:1;color:var(--ink);
    }

    .date-full{
      font-size:0.72rem;letter-spacing:0.14em;
      text-transform:uppercase;color:var(--muted);margin-top:4px;
    }

    /* write card */
    .write-card{
      background:var(--white);border-radius:20px;
      overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);
      margin-bottom:14px;
    }

    /* photo zone */
    .photo-zone{
      position:relative;width:100%;
      aspect-ratio:4/3;background:#ede8e3;
      overflow:hidden;cursor:pointer;
    }

    .pz-empty{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      height:100%;gap:8px;color:#bbb;
    }

    .pz-empty .cam{font-size:2.4rem}
    .pz-empty span{font-size:0.78rem;letter-spacing:.06em}

    #photo-input{display:none}

    .pz-grid{display:grid;height:100%}
    .pz-grid.one{grid-template-columns:1fr}
    .pz-grid.two{grid-template-columns:1fr 1fr}
    .pz-grid.three{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
    .pz-grid.three .ph:first-child{grid-row:1/3}
    .pz-grid.four{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
    .pz-grid.five{grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr}
    .pz-grid.five .ph:first-child{grid-row:1/3}

    .ph{position:relative;overflow:hidden}
    .ph img{width:100%;height:100%;object-fit:cover;transition:filter .3s}
    .ph .rm{
      position:absolute;top:6px;right:6px;
      width:24px;height:24px;
      background:rgba(0,0,0,.45);border:none;
      border-radius:50%;color:#fff;font-size:12px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
    }

    .pz-add{
      position:absolute;bottom:10px;right:10px;
      background:rgba(255,255,255,.88);border:none;
      border-radius:100px;padding:5px 12px;
      font-size:0.72rem;font-family:'Inter',sans-serif;
      cursor:pointer;color:var(--ink);
    }

    /* filter bar */
    .filter-bar{
      display:none;padding:10px 14px;
      border-top:1px solid var(--border);
      overflow-x:auto;scrollbar-width:none;
    }
    .filter-bar::-webkit-scrollbar{display:none}
    .filter-bar.show{display:flex;gap:7px;align-items:center}

    .fchip{
      flex-shrink:0;padding:5px 13px;
      border-radius:100px;border:1px solid var(--border);
      background:transparent;font-size:0.7rem;
      font-family:'Inter',sans-serif;letter-spacing:.05em;
      cursor:pointer;color:var(--muted);transition:all .15s;
    }
    .fchip.active{background:var(--ink);border-color:var(--ink);color:var(--white)}

    /* text zone */
    .text-zone{padding:18px 20px 12px}

    .entry-label{
      font-size:0.65rem;text-transform:uppercase;
      letter-spacing:.14em;color:var(--accent);
      margin-bottom:10px;font-weight:500;
    }

    .diary-textarea{
      width:100%;border:none;outline:none;
      font-family:'Cormorant Garamond',serif;
      font-size:1.2rem;line-height:1.85;
      color:var(--ink);background:transparent;
      resize:none;min-height:110px;
    }

    .diary-textarea::placeholder{color:#d0cbc5;font-style:italic}

    .text-meta{
      display:flex;justify-content:flex-end;
      padding:6px 20px 14px;font-size:0.7rem;color:#ccc;
    }

    /* CTA */
    .cta-btn{
      width:100%;padding:17px;background:var(--ink);
      color:var(--white);border:none;border-radius:16px;
      font-family:'Cormorant Garamond',serif;
      font-size:1.1rem;letter-spacing:.1em;
      cursor:pointer;transition:opacity .2s;margin-bottom:12px;
    }
    .cta-btn:active{opacity:.8}
    .cta-btn:disabled{background:#ccc;cursor:not-allowed}

    /* loading */
    .loading-block{display:none;text-align:center;padding:36px 20px}
    .loading-block.show{display:block}

    .loader{
      display:inline-block;width:34px;height:34px;
      border:2px solid var(--border);border-top-color:var(--accent2);
      border-radius:50%;animation:spin .9s linear infinite;
      margin-bottom:12px;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .loading-text{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;font-style:italic;color:var(--muted);
    }

    /* result */
    .result-wrap{display:none;margin-top:14px}
    .result-wrap.show{display:block;animation:up .4s ease}

    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .rs{
      background:var(--white);border-radius:18px;
      padding:22px 20px;box-shadow:0 4px 24px rgba(0,0,0,.06);
      margin-bottom:10px;
    }

    .rs-label{
      font-size:0.65rem;text-transform:uppercase;
      letter-spacing:.14em;color:var(--accent);
      margin-bottom:12px;font-weight:500;
    }

    .corrected-text{
      font-family:'Cormorant Garamond',serif;
      font-size:1.15rem;line-height:1.85;color:var(--ink);
    }

    .cr-row{
      display:flex;align-items:flex-start;gap:10px;
      padding:11px 0;border-bottom:1px solid var(--border);
    }
    .cr-row:last-child{border-bottom:none}

    .cr-wrong{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;color:#e07070;
      text-decoration:line-through;min-width:70px;
    }

    .cr-arrow{color:#ccc;padding-top:2px;flex-shrink:0}

    .cr-right{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;color:#6aaa6a;font-weight:600;
    }

    .cr-note{font-size:0.76rem;color:var(--muted);margin-top:3px}

    .ex-item{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;color:var(--ink2);line-height:1.75;
      padding:10px 0;border-bottom:1px solid var(--border);
    }
    .ex-item:last-child{border-bottom:none}
    .ex-num{font-size:0.62rem;letter-spacing:.1em;color:var(--accent);margin-bottom:3px}

    .encourage-box{
      background:#f5f0e8;border-radius:12px;
      padding:13px 16px;font-size:0.86rem;
      color:var(--accent2);text-align:center;
      line-height:1.6;margin-bottom:14px;
    }

    .save-cta{
      width:100%;padding:16px;background:var(--accent2);
      color:var(--white);border:none;border-radius:16px;
      font-family:'Cormorant Garamond',serif;
      font-size:1.1rem;letter-spacing:.1em;cursor:pointer;
      transition:opacity .2s;
    }
    .save-cta:active{opacity:.8}

    /* ── MUSIC ── */
    .music-wrap{display:none;margin-top:10px}
    .music-wrap.show{display:block;animation:up .4s ease}

    .music-loading{
      text-align:center;padding:28px;
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;font-style:italic;color:var(--muted);
    }

    .song-card{
      background:var(--white);border-radius:18px;
      padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.06);
      margin-bottom:10px;cursor:pointer;
      transition:transform .15s;
    }
    .song-card:active{transform:scale(0.98)}

    .song-meta{
      display:flex;align-items:center;gap:12px;
      margin-bottom:12px;
    }

    .song-icon{
      width:44px;height:44px;border-radius:10px;
      background:var(--ink);color:var(--white);
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;flex-shrink:0;
    }

    .song-info{}

    .song-title{
      font-family:'Cormorant Garamond',serif;
      font-size:1.05rem;font-weight:600;color:var(--ink);
    }

    .song-artist{
      font-size:0.75rem;color:var(--muted);
      letter-spacing:.04em;margin-top:1px;
    }

    .song-connection{
      font-size:0.72rem;color:var(--accent);
      letter-spacing:.06em;text-transform:uppercase;
      margin-bottom:8px;
    }

    .song-lyric{
      font-family:'Cormorant Garamond',serif;
      font-size:1.1rem;line-height:1.7;color:var(--ink2);
      font-style:italic;
      border-left:2px solid var(--accent);
      padding-left:12px;margin-bottom:12px;
    }

    .translate-prompt{
      font-size:0.75rem;color:var(--accent2);
      letter-spacing:.06em;text-transform:uppercase;
      margin-bottom:8px;
    }

    .translate-area{
      width:100%;border:1px solid var(--border);
      border-radius:10px;padding:12px 14px;
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;color:var(--ink);
      background:var(--bg);outline:none;
      resize:none;min-height:70px;
      transition:border-color .2s;
    }
    .translate-area:focus{border-color:var(--accent)}

    .translate-btn{
      width:100%;margin-top:8px;padding:12px;
      background:var(--ink);color:var(--white);
      border:none;border-radius:10px;
      font-family:'Cormorant Garamond',serif;
      font-size:0.95rem;letter-spacing:.06em;
      cursor:pointer;transition:opacity .2s;
    }
    .translate-btn:active{opacity:.8}
    .translate-btn:disabled{background:#ccc;cursor:not-allowed}

    .translate-result{
      margin-top:10px;padding:12px 14px;
      background:#f5f0e8;border-radius:10px;
      font-size:0.88rem;color:var(--ink2);
      line-height:1.7;display:none;
    }
    .translate-result.show{display:block;animation:up .3s ease}

    /* Spotify player */
    .spotify-bar{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;background:#f0f0f0;
      border-radius:10px;margin-bottom:12px;
      transition:background .2s;
    }

    .spotify-art{
      width:40px;height:40px;border-radius:6px;
      object-fit:cover;flex-shrink:0;
      background:#ddd;
    }

    .spotify-art-placeholder{
      width:40px;height:40px;border-radius:6px;
      background:#1DB954;display:flex;
      align-items:center;justify-content:center;
      flex-shrink:0;font-size:1.2rem;
    }

    .spotify-info{flex:1;min-width:0}

    .spotify-track-name{
      font-size:0.82rem;font-weight:500;
      color:var(--ink);white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
    }

    .spotify-artist-name{
      font-size:0.72rem;color:var(--muted);margin-top:1px;
    }

    .spotify-play-btn{
      width:36px;height:36px;border-radius:50%;
      background:#1DB954;border:none;
      color:#fff;font-size:1rem;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;text-decoration:none;
      transition:transform .15s;
    }

    .spotify-play-btn:active{transform:scale(0.92)}

    audio{display:none}

    /* ── DIARY ── */
    .diary-layout{
      max-width:540px;margin:0 auto;
      padding:32px 16px 100px;
    }

    .diary-hdr{margin-bottom:28px}

    .diary-title{
      font-family:'Cormorant Garamond',serif;
      font-size:2rem;font-weight:300;letter-spacing:.05em;
    }

    .diary-sub{
      font-size:0.72rem;letter-spacing:.1em;
      color:var(--muted);text-transform:uppercase;margin-top:4px;
    }

    .entry-card{
      background:var(--white);border-radius:20px;
      overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.05);
      margin-bottom:18px;
    }

    .entry-cover{width:100%;aspect-ratio:4/3;overflow:hidden}

    .ec-grid{display:grid;height:100%}
    .ec-grid.one{grid-template-columns:1fr}
    .ec-grid.two{grid-template-columns:1fr 1fr}
    .ec-grid.three{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
    .ec-grid.three .ec:first-child{grid-row:1/3}
    .ec-grid.four{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
    .ec-grid.five{grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr}
    .ec-grid.five .ec:first-child{grid-row:1/3}

    .ec{overflow:hidden}
    .ec img{width:100%;height:100%;object-fit:cover}

    .entry-body{padding:18px 20px 20px}

    .entry-dateline{
      display:flex;align-items:baseline;gap:8px;margin-bottom:10px;
    }

    .entry-daynum{
      font-family:'Cormorant Garamond',serif;
      font-size:2rem;font-weight:300;line-height:1;
    }

    .entry-datedetail{
      font-size:0.72rem;letter-spacing:.08em;
      color:var(--muted);text-transform:uppercase;
    }

    .entry-text{
      font-family:'Cormorant Garamond',serif;
      font-size:1.1rem;line-height:1.8;color:var(--ink);
    }

    .entry-corrected{
      font-family:'Cormorant Garamond',serif;
      font-size:0.98rem;line-height:1.75;
      color:var(--accent2);font-style:italic;
      padding-top:10px;border-top:1px solid var(--border);margin-top:8px;
    }

    /* empty */
    .empty{text-align:center;padding:80px 20px}

    .empty-title{
      font-family:'Cormorant Garamond',serif;
      font-size:1.8rem;font-weight:300;margin-bottom:8px;
    }

    .empty-sub{font-size:0.82rem;color:var(--muted);line-height:1.7}

    /* toast */
    .toast{
      position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));
      left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--ink);color:var(--white);
      padding:11px 22px;border-radius:100px;
      font-size:0.8rem;letter-spacing:.04em;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index:999;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<header>
  <div class="logo">MOMENT</div>
  <div class="nav-tabs">
    <button class="nav-btn active" onclick="switchPage('write',this)">Write</button>
    <button class="nav-btn" onclick="switchPage('diary',this)">Diary</button>
  </div>
</header>

<div class="pages">

  <!-- ══ WRITE ══ -->
  <div id="page-write" class="page active">
    <div class="write-layout">

      <div class="date-hero">
        <div class="date-day" id="date-day"></div>
        <div class="date-full" id="date-full"></div>
      </div>

      <div class="write-card">
        <div class="photo-zone" id="photo-zone" onclick="triggerUpload()">
          <div class="pz-empty" id="pz-empty">
            <div class="cam">📷</div>
            <span>Add photos</span>
          </div>
          <div class="pz-grid" id="pz-grid" style="display:none"></div>
          <button class="pz-add" id="pz-add" style="display:none"
            onclick="event.stopPropagation();triggerUpload()">＋ Add more</button>
          <input type="file" id="photo-input" accept="image/*" multiple onchange="handlePhotos(event)">
        </div>

        <div class="filter-bar" id="filter-bar"></div>

        <div class="text-zone">
          <div class="entry-label">Today's entry</div>
          <textarea class="diary-textarea" id="diary-input"
            placeholder="Write something in English…"
            oninput="updateCount()" rows="5"></textarea>
        </div>
        <div class="text-meta"><span id="char-count">0</span> chars</div>
      </div>

      <button class="cta-btn" id="check-btn" onclick="submitDiary()">Check my English</button>

      <div class="loading-block" id="loading">
        <div class="loader"></div>
        <div class="loading-text">Checking your English…</div>
      </div>

      <div class="result-wrap" id="result-wrap">
        <div class="rs">
          <div class="rs-label">Corrected</div>
          <div class="corrected-text" id="corrected-text"></div>
        </div>
        <div class="rs" id="corrections-sec" style="display:none">
          <div class="rs-label">Corrections</div>
          <div id="corrections-list"></div>
        </div>
        <div class="rs">
          <div class="rs-label">Example Sentences</div>
          <div id="examples-list"></div>
        </div>
        <div class="encourage-box" id="encourage-box"></div>
        <button class="save-cta" onclick="saveDiary()">Save to my diary</button>
      </div>

      <!-- Music section -->
      <div class="music-wrap" id="music-wrap">
        <div class="rs">
          <div class="rs-label">🎵 Today's Songs</div>
          <div class="music-loading" id="music-loading">
            <div class="loader"></div><br>Finding songs for you…
          </div>
          <div id="songs-list"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ══ DIARY ══ -->
  <div id="page-diary" class="page">
    <div class="diary-layout">
      <div class="diary-hdr">
        <div class="diary-title">My Diary</div>
        <div class="diary-sub" id="entry-count-label"></div>
      </div>
      <div id="entries-container"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // グローバル公開
  window.switchPage = (...a) => switchPage(...a);
  window.triggerUpload = () => triggerUpload();
  window.handlePhotos = (e) => handlePhotos(e);
  window.removePhoto = (i) => removePhoto(i);
  window.setFilter = (id) => setFilter(id);
  window.submitDiary = () => submitDiary();
  window.saveDiary = () => saveDiary();
  window.fetchMusic = (t) => fetchMusic(t);
  window.togglePreview = (i, u) => togglePreview(i, u);
  window.checkTranslation = (i, l) => checkTranslation(i, l);

  // ── Filters ──
  const FILTERS = [
    {id:'none',  name:'Original', css:''},
    {id:'film',  name:'Film',     css:'sepia(0.3) contrast(1.1) brightness(1.05) saturate(0.9)'},
    {id:'matte', name:'Matte',    css:'contrast(0.9) brightness(1.1) saturate(0.7) sepia(0.15)'},
    {id:'vivid', name:'Vivid',    css:'saturate(1.4) contrast(1.1) brightness(1.02)'},
    {id:'mono',  name:'Mono',     css:'grayscale(1) contrast(1.1) brightness(1.05)'},
    {id:'warm',  name:'Warm',     css:'sepia(0.4) saturate(1.2) brightness(1.05)'},
    {id:'cool',  name:'Cool',     css:'hue-rotate(15deg) saturate(0.9) brightness(1.05)'},
    {id:'fade',  name:'Fade',     css:'brightness(1.15) saturate(0.75) contrast(0.9)'},
  ];

  let photos = [];   // array of base64 data URLs
  let curFilter = 'none';
  let aiResult = null;

  // ── Date ──
  const now = new Date();
  document.getElementById('date-day').textContent = now.getDate();
  document.getElementById('date-full').textContent =
    now.toLocaleDateString('en-US',{month:'long',year:'numeric'}) + ' — ' +
    now.toLocaleDateString('en-US',{weekday:'long'});

  // ── Navigation ──
  function switchPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'diary') renderEntries();
  }

  function updateCount() {
    document.getElementById('char-count').textContent =
      document.getElementById('diary-input').value.length;
  }

  // ── Photos (base64) ──
  function triggerUpload() {
    if (photos.length >= 5) return;
    document.getElementById('photo-input').click();
  }

  function handlePhotos(e) {
    const files = Array.from(e.target.files).slice(0, 5 - photos.length);
    if (!files.length) return;

    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        // Compress to reasonable size
        const img = new Image();
        img.onload = () => {
          const MAX = 800;
          const scale = Math.min(1, MAX / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          photos.push(canvas.toDataURL('image/jpeg', 0.82));
          loaded++;
          if (loaded === files.length) { renderPhotos(); renderFilters(); }
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function gridClass(n) {
    return ['','one','two','three','four','five'][Math.min(n,5)];
  }

  function filterCSS(id) {
    return FILTERS.find(f => f.id === id)?.css || '';
  }

  function renderPhotos() {
    const zone = document.getElementById('photo-zone');
    const empty = document.getElementById('pz-empty');
    const grid = document.getElementById('pz-grid');
    const add = document.getElementById('pz-add');
    const css = filterCSS(curFilter);

    if (!photos.length) {
      empty.style.display = 'flex';
      grid.style.display = 'none';
      add.style.display = 'none';
      zone.onclick = triggerUpload;
      return;
    }

    empty.style.display = 'none';
    grid.style.display = 'grid';
    grid.className = 'pz-grid ' + gridClass(photos.length);
    zone.onclick = null;

    grid.innerHTML = photos.map((src, i) => `
      <div class="ph">
        <img src="${src}" style="filter:${css}" alt="">
        <button class="rm" onclick="event.stopPropagation();removePhoto(${i})">✕</button>
      </div>`).join('');

    add.style.display = photos.length < 5 ? 'block' : 'none';
  }

  function removePhoto(i) {
    photos.splice(i, 1);
    renderPhotos();
    if (!photos.length) document.getElementById('filter-bar').classList.remove('show');
    else renderFilters();
  }

  function renderFilters() {
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = FILTERS.map(f => `
      <button class="fchip ${f.id === curFilter ? 'active' : ''}"
        onclick="setFilter('${f.id}')">${f.name}</button>`).join('');
    bar.classList.add('show');
  }

  function setFilter(id) {
    curFilter = id;
    renderPhotos();
    renderFilters();
  }

  // ── AI Correction ──
  async function submitDiary() {
    const text = document.getElementById('diary-input').value.trim();
    if (!text) { showToast('Please write something first'); return; }

    document.getElementById('loading').classList.add('show');
    document.getElementById('result-wrap').classList.remove('show');
    document.getElementById('check-btn').disabled = true;

    try {
      const res = await fetch('/api/correct', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({text})
      });
      aiResult = await res.json();
      if (aiResult.error) throw new Error(aiResult.error);
      renderResult(aiResult);
    } catch(err) {
      showToast('Something went wrong. Please try again.');
      console.error(err);
    } finally {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('check-btn').disabled = false;
    }
  }

  async function fetchMusic(text) {
    const wrap = document.getElementById('music-wrap');
    const loading = document.getElementById('music-loading');
    const list = document.getElementById('songs-list');
    wrap.classList.add('show');
    loading.style.display = 'block';
    list.innerHTML = '';

    try {
      const res = await fetch('/api/music', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      loading.style.display = 'none';
      wrap.scrollIntoView({behavior:'smooth', block:'start'});

      const icons = ['🎵', '🎶', '🎸'];
      const songs = data.songs || [];
      list.innerHTML = songs.map((song, i) => `
        <div class="song-card" id="song-${i}">
          <div id="spotify-bar-${i}"></div>
          <div class="song-meta">
            <div class="song-icon">${icons[i]}</div>
            <div class="song-info">
              <div class="song-title">${song.title}</div>
              <div class="song-artist">${song.artist}</div>
            </div>
          </div>
          <div class="song-connection">${song.connection_ja}</div>
          <div class="song-lyric">${song.lyric}</div>
          <div class="translate-prompt">日本語に訳してみよう</div>
          <textarea class="translate-area" id="ta-${i}"
            placeholder="あなたの訳を書いてみて…" rows="2"></textarea>
          <button class="translate-btn" onclick="checkTranslation(${i}, '${song.lyric.replace(/'/g, "\\'")}')">
            訳を確認する
          </button>
          <div class="translate-result" id="tr-${i}"></div>
        </div>
      `).join('');

      // Spotify検索（並行実行）
      songs.forEach((song, i) => searchSpotify(song, i));
    } catch (err) {
      loading.style.display = 'none';
      list.innerHTML = '<div style="color:#bbb;font-size:.85rem;padding:8px">曲の取得に失敗しました</div>';
    }
  }

  let currentAudio = null;

  async function searchSpotify(song, i) {
    const bar = document.getElementById('spotify-bar-' + i);
    try {
      const res = await fetch('/api/spotify-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: song.title, artist: song.artist })
      });
      const data = await res.json();
      if (!data.found) return;

      if (data.previewUrl) {
        // 30秒プレビュー再生ボタン
        bar.innerHTML = `
          <div class="spotify-bar">
            ${data.albumArt
              ? `<img class="spotify-art" src="${data.albumArt}" alt="">`
              : `<div class="spotify-art-placeholder">♪</div>`}
            <div class="spotify-info">
              <div class="spotify-track-name">${song.title}</div>
              <div class="spotify-artist-name">${song.artist}</div>
            </div>
            <button class="spotify-play-btn" id="play-btn-${i}"
              onclick="togglePreview(${i}, '${data.previewUrl}')">▶</button>
            <a class="spotify-play-btn" href="${data.trackUrl}" target="_blank"
              title="Spotifyで開く" style="background:#111;font-size:.75rem;text-decoration:none">
              ↗
            </a>
          </div>
          <audio id="audio-${i}" src="${data.previewUrl}"></audio>`;
      } else {
        // プレビューなし → Spotifyで開くボタンのみ
        bar.innerHTML = `
          <div class="spotify-bar">
            ${data.albumArt
              ? `<img class="spotify-art" src="${data.albumArt}" alt="">`
              : `<div class="spotify-art-placeholder">♪</div>`}
            <div class="spotify-info">
              <div class="spotify-track-name">${song.title}</div>
              <div class="spotify-artist-name">${song.artist}</div>
            </div>
            <a class="spotify-play-btn" href="${data.trackUrl}" target="_blank"
              title="Spotifyで開く" style="text-decoration:none">▶</a>
          </div>`;
      }
    } catch { /* Spotify未設定時は何も表示しない */ }
  }

  function togglePreview(i, url) {
    const audio = document.getElementById('audio-' + i);
    const btn = document.getElementById('play-btn-' + i);

    if (currentAudio && currentAudio !== audio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      const prevBtn = document.querySelector('.spotify-play-btn.playing');
      if (prevBtn) { prevBtn.textContent = '▶'; prevBtn.classList.remove('playing'); }
    }

    if (audio.paused) {
      audio.play();
      btn.textContent = '⏸';
      btn.classList.add('playing');
      currentAudio = audio;
      audio.onended = () => { btn.textContent = '▶'; btn.classList.remove('playing'); };
    } else {
      audio.pause();
      btn.textContent = '▶';
      btn.classList.remove('playing');
    }
  }

  async function checkTranslation(idx, lyric) {
    const input = document.getElementById('ta-' + idx).value.trim();
    if (!input) { showToast('訳を入力してください'); return; }

    const btn = document.querySelector(`#song-${idx} .translate-btn`);
    btn.disabled = true;
    btn.textContent = '確認中…';

    try {
      const res = await fetch('/api/correct', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: `Translate this English lyric to Japanese: "${lyric}"\nMy translation: "${input}"\nPlease respond in JSON with: {"feedback_ja": "フィードバック（日本語）", "natural_ja": "自然な日本語訳", "encouragement_ja": "励まし"}` })
      });
      const data = await res.json();

      const resultEl = document.getElementById('tr-' + idx);
      const feedback = data.corrected || '';
      try {
        const parsed = JSON.parse(data.corrected || '{}');
        resultEl.innerHTML = `
          <div style="margin-bottom:8px"><span style="color:var(--accent);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase">自然な訳</span><br>
          <span style="font-family:'Cormorant Garamond',serif;font-size:1.05rem">${parsed.natural_ja || ''}</span></div>
          <div style="font-size:.83rem;color:var(--ink2);margin-bottom:6px">${parsed.feedback_ja || ''}</div>
          <div style="font-size:.82rem;color:var(--accent2)">${parsed.encouragement_ja || ''}</div>`;
      } catch {
        resultEl.textContent = feedback;
      }
      resultEl.classList.add('show');
    } catch {
      showToast('エラーが発生しました');
    } finally {
      btn.disabled = false;
      btn.textContent = '訳を確認する';
    }
  }

  function renderResult(d) {
    document.getElementById('corrected-text').textContent = d.corrected;

    const corrSec = document.getElementById('corrections-sec');
    if (d.corrections?.length) {
      document.getElementById('corrections-list').innerHTML = d.corrections.map(c => `
        <div class="cr-row">
          <div class="cr-wrong">${c.original}</div>
          <div class="cr-arrow">→</div>
          <div>
            <div class="cr-right">${c.fixed}</div>
            <div class="cr-note">${c.explanation_ja}</div>
          </div>
        </div>`).join('');
      corrSec.style.display = 'block';
    } else {
      corrSec.style.display = 'none';
    }

    document.getElementById('examples-list').innerHTML = (d.examples || []).map((ex, i) => `
      <div class="ex-item">
        <div class="ex-num">Example ${i + 1}</div>${ex}
      </div>`).join('');

    document.getElementById('encourage-box').textContent = d.encouragement_ja || '';
    document.getElementById('result-wrap').classList.add('show');
    document.getElementById('result-wrap').scrollIntoView({behavior:'smooth',block:'nearest'});
    fetchMusic(document.getElementById('diary-input').value.trim());
  }

  // ── Save / Load (localStorage) ──
  function loadEntries() {
    try { return JSON.parse(localStorage.getItem('moment_entries') || '[]'); }
    catch { return []; }
  }

  function saveEntries(entries) {
    localStorage.setItem('moment_entries', JSON.stringify(entries));
  }

  function saveDiary() {
    const text = document.getElementById('diary-input').value.trim();
    if (!text) { showToast('Nothing to save'); return; }

    const entry = {
      id: Date.now(),
      date: now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
      createdAt: now.toISOString(),
      text,
      corrected: aiResult?.corrected || text,
      photos: [...photos],
      filter: curFilter
    };

    const entries = loadEntries();
    entries.unshift(entry);
    saveEntries(entries);

    showToast('Saved ✦');

    // Reset
    document.getElementById('diary-input').value = '';
    photos = [];
    aiResult = null;
    curFilter = 'none';
    renderPhotos();
    document.getElementById('filter-bar').classList.remove('show');
    updateCount();
    document.getElementById('result-wrap').classList.remove('show');
  }

  function renderEntries() {
    const entries = loadEntries();
    const cont = document.getElementById('entries-container');
    document.getElementById('entry-count-label').textContent =
      entries.length + (entries.length === 1 ? ' entry' : ' entries');

    if (!entries.length) {
      cont.innerHTML = `<div class="empty">
        <div class="empty-title">No entries yet</div>
        <div class="empty-sub">Start writing your diary<br>and capture your moments.</div>
      </div>`;
      return;
    }

    cont.innerHTML = entries.map(entry => {
      const d = new Date(entry.createdAt);
      const css = filterCSS(entry.filter || 'none');
      const ph = entry.photos || [];
      const gc = gridClass(Math.min(ph.length, 5));

      const cover = ph.length ? `
        <div class="entry-cover">
          <div class="ec-grid ${gc}">
            ${ph.map(src => `<div class="ec"><img src="${src}" style="filter:${css}" alt=""></div>`).join('')}
          </div>
        </div>` : '';

      const corrected = entry.corrected && entry.corrected !== entry.text
        ? `<div class="entry-corrected">${entry.corrected}</div>` : '';

      return `
        <div class="entry-card">
          ${cover}
          <div class="entry-body">
            <div class="entry-dateline">
              <div class="entry-daynum">${d.getDate()}</div>
              <div class="entry-datedetail">
                ${d.toLocaleDateString('en-US',{month:'long',year:'numeric'})} · ${d.toLocaleDateString('en-US',{weekday:'long'})}
              </div>
            </div>
            <div class="entry-text">${entry.text}</div>
            ${corrected}
          </div>
        </div>`;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
